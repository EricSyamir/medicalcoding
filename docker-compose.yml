version: "3.9"

services:
  medical-coder:
    build:
      context: .
      dockerfile: Dockerfile
    image: medical-coding-system:latest
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount a local notes directory and output directory
      - ./notes:/app/notes:ro
      - ./output:/app/output
      - ./logs:/app/logs
    # Override CMD to process a file from the mounted volume:
    #   docker-compose run medical-coder --input /app/notes/my_note.txt --output /app/output/result.json --pretty
    command: ["--help"]
